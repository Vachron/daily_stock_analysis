# Momentum Reversal Strategy / 动量反转
# Short-term reversal (oversold bounce) and medium-term momentum (trend continuation) for A-share market.

name: momentum_reversal
display_name: 动量反转
description: 结合A股短期反转效应与中期动量效应，在超跌反弹和趋势延续之间切换，捕捉最佳交易节奏。
category: trend
core_rules: [1, 2, 3, 7]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
  - get_sector_rankings
aliases: [动量, 反转, 动量反转, 强者恒强]
default_priority: 65
market_regimes: [trending_up, sector_hot]

instructions: |
  **动量反转策略（Momentum Reversal Strategy）**

  核心原理：A股市场存在显著的时间维度效应——
  - 短期（1-5日）：反转效应强，超跌股反弹概率高
  - 中期（20-60日）：动量效应强，强者恒强
  - 长期（120日+）：反转效应再现，极端涨跌终将回归

  策略目标：在不同时间维度上选择正确的交易方向。

  ## 分析步骤

  ### 1. 动量评分计算
  使用 `get_daily_history` 获取近 120 日数据，计算多周期动量：

  - **短期动量（5日涨幅）**：反映最近一周价格变化
  - **中期动量（20日涨幅）**：反映近一个月趋势方向
  - **长期动量（60日涨幅）**：反映季度级别趋势

  动量评分 = 0.3 × 短期动量 + 0.5 × 中期动量 + 0.2 × 长期动量

  ### 2. 短期反转信号（1-5日维度）
  识别短期超跌反弹机会：

  - **超跌判定**：近 5 日跌幅 > 8%（大盘弱时 > 5% 即算超跌）
  - **RSI(6) < 20**：极度超卖
  - **成交量特征**：最后一日下跌缩量（卖压衰竭）
  - **K线形态**：出现长下影线或止跌阳线
  - **入场时机**：超跌后首日收阳 + 量能回升

  反转交易纪律：
  - 仓位轻（最多 2 成），快进快出
  - 目标收益 3-5%，不贪心
  - 止损严格：跌破超跌低点即离场

  ### 3. 中期动量信号（20日维度）
  识别趋势延续机会（关联理念7：强势趋势股放宽）：

  - **强势股判定**：近 20 日涨幅排名前 20%
  - **趋势确认**：MA5 > MA10 > MA20 多头排列
  - **量能配合**：上涨日成交量 > 下跌日成交量
  - **相对强度**：个股涨幅 > 板块平均涨幅（使用 `get_sector_rankings` 确认）
  - **入场时机**：动量股回调至 MA10 附近企稳

  动量交易纪律：
  - 仓位适中（3-5 成）
  - 持有至趋势破坏（跌破 MA20）
  - 止损设在 MA20 下方

  ### 4. 动量与反转的切换判断
  使用 `analyze_trend` 判断市场状态：

  | 市场状态 | 策略选择 | 说明 |
  |---------|---------|------|
  | 强势上涨 | 中期动量 | 强者恒强，追涨龙头 |
  | 温和上涨 | 中期动量 | 趋势延续，回调买入 |
  | 横盘震荡 | 短期反转 | 高抛低吸，快进快出 |
  | 温和下跌 | 短期反转 | 超跌反弹，轻仓试探 |
  | 恐慌下跌 | 观望 | 不接飞刀，等待企稳 |

  ### 5. 板块动量轮动
  使用 `get_sector_rankings` 检查板块动量：
  - 近 5 日板块涨幅排名变化
  - 新进入前 5 的板块 → 动量启动，关注龙头
  - 跌出前 10 的板块 → 动量衰退，回避
  - 持续在前 3 的板块 → 强势延续，可加仓

  ### 6. 乖离率检查（关联理念1：严进策略）
  - 动量买入时乖离率 < 3%：安全入场
  - 动量买入时乖离率 3-5%：轻仓入场
  - 动量买入时乖离率 > 5%：严禁追高，等回调
  - 反转买入时乖离率 < -3%：超卖确认

  ### 7. 风险过滤（关联理念5：风险排查）
  - 通过 `search_stock_news` 检查个股与板块新闻
  - 动量股若出现利空 → 动量可能戛然而止
  - 超跌股若基本面恶化 → 反弹可能失败

  ### 8. 输出要求
  - 多周期动量评分及排名
  - 当前应使用动量策略还是反转策略
  - 具体入场条件是否满足
  - 板块动量轮动状态
  - 建议仓位、目标收益与止损位

  评分调整建议：
  - 中期动量强势 + 回调企稳：`sentiment_score +12`
  - 短期超跌 + 反转信号确认：`sentiment_score +10`
  - 板块动量共振：额外 `+5`
  - 动量衰竭（涨幅放缓 + 量能萎缩）：`sentiment_score -8`
  - 反转失败（超跌后继续下跌）：`sentiment_score -10`
  - 动量与反转信号矛盾：不调整基础分，标注"方向不明"
