instructions: |
  **涨停回马枪策略（Limit-Up Pullback Strategy）**

  核心原理：涨停是A股最强势的信号，代表主力资金强力介入。
  涨停后缩量回调是主力洗盘而非出货，再次启动时是最佳上车点。

  ## 分析步骤

  ### 1. 涨停识别
  使用 `get_daily_history` 获取近 20 日数据：

  - **A股涨停判定**：
    - 主板（60/00开头）：涨幅 ≥ 9.9%
    - 科创板（688开头）/ 创业板（30开头）：涨幅 ≥ 19.9%
    - ST股：涨幅 ≥ 4.9%（但ST股不建议参与，关联风险过滤）
  - **涨停质量评估**：
    - 一字涨停（开盘即涨停）：极强，但回调概率低
    - 早盘涨停（10:00前封板）：强
    - 午后涨停（14:00后封板）：偏弱，次日低开概率高
    - 尾盘炸板回封：分歧大，需谨慎

  ### 2. 回调分析（洗盘确认）
  涨停后 1-5 日内观察回调：

  - **缩量回调**（核心条件，关联理念3：效率优先）：
    - 回调日成交量 < 涨停日成交量的 70%
    - 缩量越明显，洗盘特征越强
  - **回调幅度控制**：
    - 回调幅度 < 涨停日涨幅的 50%（即回吐不超过一半）
    - 回调不破涨停日开盘价
    - 回调不破 MA5
  - **回调天数**：
    - 1-3 日回调：强势洗盘，最佳
    - 4-5 日回调：中等，需确认未破关键支撑
    - > 5 日：洗盘时间过长，可能转弱

  ### 3. 再次启动确认
  使用 `get_realtime_quote` 确认：

  - **放量阳线**：当日成交量 > 5 日均量，且收阳
  - **突破回调高点**：价格突破回调期间最高价
  - **MACD 配合**：DIF 在零轴上方或即将金叉
  - **均线支撑**：价格在 MA5 或 MA10 上方

  ### 4. 趋势背景过滤（关联理念2：趋势交易）
  使用 `analyze_trend` 确认：
  - 多头排列（MA5 > MA10 > MA20）：最佳环境
  - 涨停前已有上升趋势：可靠性高
  - 涨停前为下跌趋势中的反弹涨停：风险大，不参与

  ### 5. 乖离率检查（关联理念1：严进策略）
  - 涨停日乖离率 > 5%：追高风险大，等回调
  - 回调后乖离率 < 3%：安全入场区间
  - 再次启动时乖离率 > 5%：严禁追高

  ### 6. 风险过滤（关联理念5：风险排查）
  - 通过 `search_stock_news` 检查涨停原因：
    - 重大利好（政策/业绩/重组）：可靠性高
    - 概念炒作/游资接力：风险大，快进快出
    - 无明确利好：警惕出货型涨停
  - 连续涨停（2连板以上）后回调：风险递增，谨慎参与
  - 大盘弱势时涨停回马枪成功率降低

  ### 7. 输出要求
  - 是否出现涨停信号及涨停质量评级
  - 回调是否满足缩量+幅度控制条件
  - 是否出现再次启动信号
  - 涨停原因分析（利好驱动/概念炒作/无明确原因）
  - 建议仓位与止损位（止损设在涨停日开盘价下方 2%）

  评分调整建议：
  - 涨停 + 缩量回调企稳 + 放量再启动：`sentiment_score +15`
  - 涨停 + 缩量回调但未再启动：`sentiment_score +5，标注"等待启动"`
  - 涨停 + 放量回调（出货嫌疑）：`sentiment_score -10`
  - 涨停 + 回调破关键支撑：`sentiment_score -5，标注"形态破坏"`
  - 连板后回调：`sentiment_score 不额外加分，标注"高风险"`
