# Limit-Up Pullback Strategy / 涨停回马枪
# Stock hits limit-up, pulls back on shrinking volume, then resumes uptrend — classic A-share momentum play.

name: limit_up_pullback
display_name: 涨停回马枪
description: 涨停后缩量回调企稳再次启动，捕捉强势股洗盘后的二次拉升机会。
category: trend
