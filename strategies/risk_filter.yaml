# Risk Filter Strategy / 风险过滤
# Pre-analysis risk screening: ST stocks, delisting risk, low market cap, recent surge, fundamental red flags.

name: risk_filter
display_name: 风险过滤
description: 分析前风险筛查，自动排除ST/退市风险/低市值/近期暴涨/基本面异常等高风险标的，为所有策略提供安全底线。
category: framework
core_rules: [1, 5]
required_tools:
  - get_daily_history
  - get_realtime_quote
  - search_stock_news
aliases: [风险过滤, 风控, 排雷, 风险筛查]
default_priority: 5
market_regimes: [trending_up, trending_down, sideways, volatile, sector_hot]

instructions: |
  **风险过滤策略（Risk Filter Strategy）**

  核心定位：本策略不是交易策略，而是所有策略的前置风控筛查。
  在执行任何分析策略之前，必须先通过风险过滤，排除高风险标的。
  优先级设为 5（最高），确保最先执行。

  ## 分析步骤

  ### 1. ST 与退市风险筛查
  使用 `get_realtime_quote` 获取股票名称：

  - **ST 股**：名称包含"ST" → 排除（涨跌幅限制 ±5%，流动性差）
  - **\*ST 股**：名称包含"\*ST" → 强制排除（退市风险警示）
  - **退市整理期**：名称包含"退" → 强制排除
  - **风险警示**：名称包含"风险" → 标记警告

  ### 2. 市值与流动性筛查
  使用 `get_realtime_quote` 获取市值数据：

  - **总市值 < 30 亿**：排除（流动性差，易被操纵，波动剧烈）
  - **总市值 30-50 亿**：标记警告（流动性一般，需谨慎）
  - **日均成交额 < 5000 万**：排除（流动性不足，难以进出）
  - **日均换手率 < 0.5%**：标记警告（无人关注，可能为僵尸股）

  ### 3. 近期暴涨风险筛查
  使用 `get_daily_history` 获取近 20 日数据：

  - **近 5 日涨幅 > 30%**：排除（短期暴涨，追高风险极大）
  - **近 10 日涨幅 > 50%**：排除（严重超买，回调风险极高）
  - **近 20 日涨幅 > 80%**：排除（极端行情，风险不可控）
  - **连续 3 日以上涨停**：排除（筹码断层，开板即暴跌风险）
  - **近 5 日涨幅 20-30%**：标记警告（涨幅较大，需谨慎追高）

  ### 4. 基本面排雷
  使用 `search_stock_news` 搜索风险关键词：

  - **财务造假**：搜索"造假 虚增 处罚 证监会" → 排除
  - **重大诉讼**：搜索"诉讼 仲裁 赔偿" → 标记警告
  - **减持公告**：搜索"减持 大股东减持" → 标记警告
  - **业绩暴雷**：搜索"亏损 下降 业绩预告向下修正" → 标记警告
  - **监管处罚**：搜索"处罚 警示函 立案调查" → 排除
  - **退市风险**：搜索"退市 终止上市" → 强制排除

  ### 5. 技术面风险筛查
  使用 `analyze_trend` 检查：

  - **均线空头排列且发散**（MA5 < MA10 < MA20 且间距扩大）：标记"强下跌趋势"
  - **跌破所有均线**：标记"技术面全面破位"
  - **MACD 零轴下方死叉**：标记"动量加速下行"
  - **成交量异常萎缩**（量比 < 0.3）：标记"流动性枯竭"

  ### 6. 市场环境风险
  - **大盘暴跌**（上证指数日跌幅 > 3%）：标记"系统性风险"
  - **板块整体下跌**（所属板块跌幅 > 2%）：标记"板块风险"
  - **北向资金大幅流出**（如可获取）：标记"资金外流"

  ### 7. 风险等级判定

  | 风险等级 | 条件 | 操作 |
  |---------|------|------|
  | 🚫 强制排除 | ST/\*ST/退市/造假/处罚/连续涨停 | 不进行分析 |
  | ⛔ 高风险 | 低市值/暴涨/业绩暴雷/技术破位 | 可分析但标注高风险，不建议买入 |
  | ⚠️ 警告 | 减持/诉讼/涨幅较大/流动性一般 | 可分析，需额外注意风险 |
  | ✅ 安全 | 无上述风险 | 正常分析 |

  ### 8. 输出要求
  - 风险等级（强制排除/高风险/警告/安全）
  - 触发的风险项列表及详情
  - 若为强制排除，直接终止后续分析
  - 若为高风险或警告，在后续所有策略分析中持续标注风险提示

  评分调整建议：
  - 强制排除：`sentiment_score = 0，标注"不建议参与"`
  - 高风险：`sentiment_score -20`
  - 警告：`sentiment_score -5`
  - 安全：不调整基础分
