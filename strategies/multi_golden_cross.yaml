instructions: |
  **多金叉共振策略（Multi Golden Cross Resonance Strategy）**

  核心原理：单一指标金叉可能产生假信号，但当多个独立指标
  在短期内（5个交易日内）同时出现金叉，信号可靠性大幅提升。
  这是"共振"效应——不同维度的指标同时确认同一方向。

  ## 分析步骤

  ### 1. 均线金叉检测
  使用 `get_daily_history` 和 `analyze_trend` 获取均线数据：

  - **MA5 上穿 MA10**（短期金叉）：反映短期趋势转多
  - **MA10 上穿 MA20**（中期金叉）：反映中期趋势转多
  - **MA5 上穿 MA20**（短穿中金叉）：较强信号
  - 金叉有效性：金叉后 3 日均线仍保持多头排列

  ### 2. KDJ 金叉检测
  使用 `get_daily_history` 计算 KDJ(9,3,3)：

  - **K 线上穿 D 线**：KDJ 金叉
  - **金叉位置**：
    - 超卖区金叉（K < 20 时金叉）：最强信号
    - 低位金叉（K 在 20-50 之间金叉）：中等信号
    - 高位金叉（K > 50 时金叉）：弱信号，可能滞后
  - **J 值配合**：J 值从负值区域回升 > 0，确认超卖反弹
  - KDJ 金叉失败判定：金叉后 K 线 3 日内再次下穿 D 线

  ### 3. MACD 金叉检测
  使用 `analyze_trend` 获取 MACD 数据：

  - **DIF 上穿 DEA**：MACD 金叉
  - **金叉位置**：
    - 零轴上方金叉（DIF > 0）：最强信号，趋势加速
    - 零轴附近金叉：中等信号，趋势转折
    - 零轴下方金叉：弱信号，可能仅为反弹
  - **绿柱转红柱**：MACD 柱状图由绿转红，确认动量转向
  - MACD 金叉失败判定：金叉后 DIF 3 日内再次下穿 DEA

  ### 4. 共振判定
  统计近 5 个交易日内出现的金叉数量：

  | 金叉数量 | 信号强度 | 说明 |
  |---------|---------|------|
  | 1 个 | 弱 | 单一指标，假信号概率高 |
  | 2 个 | 中 | 两个维度确认，可靠性提升 |
  | 3 个 | 强 | 三维度共振，高可靠性 |
  | 4 个以上 | 极强 | 多维度高度共振，最强信号 |

  **共振窗口**：所有金叉需在 5 个交易日内出现，超过此窗口不算共振。

  ### 5. 量能确认（关联理念3：效率优先）
  使用 `get_realtime_quote` 检查：
  - 共振日放量（量比 > 1.5）：信号增强
  - 共振日缩量：信号减弱
  - 连续 3 日量能递增：趋势确认

  ### 6. 趋势背景过滤（关联理念2：趋势交易）
  - 下跌末期 + 多金叉共振：趋势反转信号
  - 上升趋势中 + 多金叉共振：趋势加速信号
  - 横盘震荡 + 多金叉共振：方向选择信号
  - 下跌趋势中 + 单一金叉：可能为技术性反弹

  ### 7. 乖离率检查（关联理念1：严进策略）
  - 共振时乖离率 < 2%：最佳入场区间
  - 共振时乖离率 2-5%：轻仓入场
  - 共振时乖离率 > 5%：严禁追高，等回调至均线附近

  ### 8. 风险过滤（关联理念5：风险排查）
  - 通过 `search_stock_news` 检查是否有利空
  - 利空消息下的金叉共振可能是诱多
  - 大盘系统性风险时，个股金叉共振成功率降低

  ### 9. 输出要求
  - 近 5 日内各指标金叉状态（均线/KDJ/MACD）
  - 共振数量及信号强度评级
  - 各金叉出现的位置（超卖区/零轴等）
  - 量能配合情况
  - 建议仓位与止损位（止损设在最近金叉日的最低价下方 2%）

  评分调整建议：
  - 三金叉共振 + 放量确认：`sentiment_score +18`
  - 两金叉共振 + 量能配合：`sentiment_score +10`
  - 单一金叉：`sentiment_score +3`
  - 零轴上方MACD金叉 + 均线金叉：额外 `+5`
  - KDJ超卖区金叉共振：额外 `+5`
  - 金叉后失败（3日内死叉）：`sentiment_score -8`
