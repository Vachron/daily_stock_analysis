# Morning Star Strategy / 启明星
# Three-candle bottom reversal pattern: large bearish → small body → large bullish.

name: morning_star
display_name: 启明星
description: 经典三根K线底部反转形态，由大阴线+十字星/小实体+大阳线组成，预示下跌趋势即将反转。
category: pattern
core_rules: [1, 2, 3]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [启明星, 晨星, 早晨之星, 底部反转形态]
