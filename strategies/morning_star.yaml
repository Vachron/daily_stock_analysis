instructions: |
  **启明星策略（Morning Star Strategy）**

  核心原理：启明星是最可靠的底部反转K线形态之一。
  由三根K线组成，代表空方力量衰竭→多空平衡→多方反攻的过程。

  ## 分析步骤

  ### 1. 形态识别
  使用 `get_daily_history` 获取近 30 日数据，逐日检查三根K线组合：

  **第一根K线（大阴线）**：
  - 实体为阴线（收盘 < 开盘）
  - 实体长度 > 近 20 日平均实体的 1.5 倍
  - 最好无上影线或上影线极短
  - 代表空方强势主导

  **第二根K线（星线）**：
  - 实体极小：|收盘 - 开盘| < 近 20 日平均实体的 0.3 倍
  - 与第一根K线之间存在向下跳空缺口（开盘低于前日收盘）更佳
  - 可为阴线也可为阳线
  - 十字星（开盘≈收盘）为最强信号
  - 代表多空力量达到平衡

  **第三根K线（大阳线）**：
  - 实体为阳线（收盘 > 开盘）
  - 实体长度 > 近 20 日平均实体的 1.5 倍
  - 收盘价深入第一根阴线实体的一半以上
  - 最好与第二根K线之间存在向上跳空缺口
  - 代表多方强力反攻

  ### 2. 形态质量评估
  - **标准启明星**：三根K线完全符合上述条件 → 强信号
  - **十字启明星**：第二根为十字星 → 最强信号
  - **跳空启明星**：存在两个跳空缺口 → 极强信号
  - **弱启明星**：第三根阳线未深入第一根阴线实体一半 → 弱信号

  ### 3. 位置确认（关键过滤）
  形态出现的位置决定信号可靠性：

  - **下跌趋势末期**（MA5 < MA10 < MA20，但偏离度开始缩小）：最佳
  - **重要支撑位附近**（前期低点、MA60、整数关口）：增强
  - **超卖区域**（RSI < 30）：增强
  - **下跌趋势中期**（均线空头排列且发散）：弱信号，可能只是反弹
  - **横盘震荡中**：中等信号

  ### 4. 量能确认（关联理念3：效率优先）
  使用 `get_realtime_quote` 检查：
  - 第一根阴线放量：恐慌抛售，筹码换手充分
  - 第二根星线缩量：卖压衰竭
  - 第三根阳线放量：买盘涌入，确认反转
  - 量能递减→递增的模式是最健康的

  ### 5. 趋势背景评估（关联理念2：趋势交易）
  使用 `analyze_trend` 判断：
  - 下跌趋势末期 + 启明星：趋势反转信号
  - 下跌趋势中期 + 启明星：可能只是技术性反弹
  - 横盘底部 + 启明星：突破信号

  ### 6. 乖离率检查（关联理念1：严进策略）
  - 启明星出现时乖离率 < -3%：超卖确认，信号增强
  - 启明星出现时乖离率 > 0%：可能不是真正的底部
  - 第三根阳线收盘后乖离率仍 < 2%：安全入场区间

  ### 7. 辅助验证
  - MACD 底背离或即将金叉：增强
  - RSI 从超卖区回升：增强
  - 布林带触及下轨后回归：增强
  - 通过 `search_stock_news` 检查是否有基本面利空（若有，形态可能失败）

  ### 8. 输出要求
  - 是否识别出启明星形态及质量评级
  - 形态出现的位置（趋势阶段+支撑位）
  - 量能配合情况
  - 辅助指标验证结果
  - 建议入场价、止损位（设在星线最低价下方 2%）、目标价（第一根阴线开盘价）

  评分调整建议：
  - 十字启明星确认 + 放量 + 超卖位置：`sentiment_score +15`
  - 标准启明星确认 + 量能配合：`sentiment_score +12`
  - 弱启明星（阳线未深入阴线一半）：`sentiment_score +5`
  - 启明星但趋势仍为空头：`sentiment_score +3，标注"可能仅为反弹"`
  - 无启明星形态：不调整基础分
