# W-Bottom Double Bottom Reversal Strategy / W底双底反转
# Price forms two roughly equal lows with a bounce between them — classic reversal pattern.

name: w_bottom
display_name: W底双底反转
description: 识别W底（双底）反转形态，两个低点大致相等且中间有反弹，颈线突破确认趋势反转。
