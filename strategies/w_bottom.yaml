instructions: |
  **W底双底反转策略（W-Bottom Double Bottom Reversal Strategy）**

  核心原理：W底是最经典的底部反转形态，由两个大致相等的低点构成。
  第一个低点确认支撑，第二个低点确认支撑有效，突破颈线后趋势反转。

  ## 分析步骤

  ### 1. W底形态识别
  使用 `get_daily_history` 获取近 60 日数据：

  **左底（第一低点）**：
  - 近 60 日内出现的第一个显著低点
  - 低点前后至少有 3 日下跌和 3 日上涨
  - 低点日收盘价为局部最低

  **反弹（中间高点/颈线）**：
  - 两个低点之间的反弹高点
  - 反弹幅度 > 左底到反弹高点距离的 30%
  - 反弹高点即为颈线位置

  **右底（第二低点）**：
  - 第二个低点与左底价格差距 < 3%
  - 右底时间距左底至少 10 个交易日（形态充分）
  - 右底时间距左底不超过 40 个交易日（形态不过于松散）

  ### 2. 颈线与突破确认
  - **颈线**：两个低点之间反弹的最高收盘价
  - **突破信号**：收盘价站上颈线
  - **有效突破**：
    - 突破日收盘价 > 颈线
    - 突破日成交量 > 5 日均量的 1.5 倍
    - 突破后 2 日内未跌回颈线以下
  - **假突破**：突破后 2 日内跌回颈线以下，需重新等待

  ### 3. 形态质量评估
  - **标准W底**：两底价格差 < 2%，反弹幅度适中 → 强信号
  - **右底略高**：右底高于左底，说明买盘更积极 → 最强信号
  - **右底略低**：右底低于左底但差距 < 3% → 中等信号
  - **圆弧底叠加**：右底形成过程缓慢圆弧 → 增强信号
  - **两底差距过大**（> 5%）：形态不标准，信号减弱

  ### 4. 量能配合验证（关联理念3：效率优先）
  - 左底形成时放量下跌后缩量企稳 → 正常
  - 反弹时量能温和放大 → 健康
  - 右底形成时缩量（成交量 < 左底时） → 卖压衰竭，最佳
  - 突破颈线时放量 → 确认信号
  - 右底放量破左底 → 形态失败

  ### 5. 目标价计算
  W底突破后的理论目标价：
  - **最小目标** = 颈线价 + (颈线价 - 两底平均价)
  - **保守目标** = 颈线价 + (颈线价 - 两底平均价) × 0.7
  - **激进目标** = 颈线价 + (颈线价 - 两底平均价) × 1.5

  ### 6. 趋势背景评估（关联理念2：趋势交易）
  使用 `analyze_trend` 判断：
  - 长期下跌后出现W底：趋势反转信号，可靠性高
  - 横盘震荡中出现W底：区间底部确认
  - 上升趋势中出现W底：回调结束，趋势延续
  - 下跌趋势中W底失败（右底破左底）：趋势加速下跌

  ### 7. 乖离率检查（关联理念1：严进策略）
  - W底形成时乖离率 < -3%：超卖确认
  - 突破颈线时乖离率 < 3%：安全入场
  - 突破颈线时乖离率 > 5%：等回调再入场

  ### 8. 风险过滤（关联理念5：风险排查）
  - 通过 `search_stock_news` 检查基本面
  - 基本面持续恶化的股票，W底可能反复失败
  - 行业整体下行时，个股W底突破后容易回落

  ### 9. 输出要求
  - 是否识别出W底形态及质量评级
  - 左底/右底价格、颈线位置
  - 是否已突破颈线及突破有效性
  - 理论目标价计算
  - 量能配合评估
  - 建议入场价、止损位（设在右底最低价下方 2%）、目标价

  评分调整建议：
  - W底确认 + 放量突破颈线：`sentiment_score +15`
  - W底确认 + 右底缩量 + 待突破：`sentiment_score +8，标注"等待颈线突破"`
  - W底形态形成中（右底未确认）：`sentiment_score +3，标注"形态未完成"`
  - W底失败（右底破左底）：`sentiment_score -10`
  - 无W底形态：不调整基础分
