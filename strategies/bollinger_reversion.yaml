# Bollinger Band Mean Reversion Strategy / 布林带回归
# Price touches Bollinger Band extremes and reverts to the mean — effective in range-bound markets.

name: bollinger_reversion
display_name: 布林带回归
description: 基于布林带上下轨识别超买超卖区间，价格触及轨道极值后回归中轨的均值回归策略。
category: reversal
core_rules: [1, 3, 6]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [布林带, 布林, BOLL, 均值回归]
default_priority: 45
market_regimes: [sideways]

instructions: |
  **布林带回归策略（Bollinger Band Mean Reversion Strategy）**

  核心原理：布林带由中轨（MA20）和上下轨（中轨±2倍标准差）构成。
  价格触及上轨往往超买，触及下轨往往超卖，大概率回归中轨。

  ## 分析步骤

  ### 1. 布林带状态识别
  使用 `get_daily_history` 获取近 30 日数据，结合 `analyze_trend`：

  - **带宽计算**：(上轨 - 下轨) / 中轨 × 100%
  - **位置判断**：当前价格在布林带中的相对位置
    - 触及/突破上轨：超买区域
    - 触及/突破下轨：超卖区域
    - 中轨附近：中性区域

  ### 2. 带宽收缩与扩张（关键信号）
  - **带宽收缩（Squeeze）**：带宽 < 近 60 日带宽的 20% 分位
    - 表示波动率极度压缩，即将出现方向性突破
    - 收缩越久，突破力度越大
    - 此时不宜急于做回归，应等待方向确认
  - **带宽扩张（Expansion）**：带宽 > 近 60 日带宽的 80% 分位
    - 表示波动率放大，趋势可能加速
    - 回归策略需谨慎，趋势可能延续
  - **带宽正常**：回归策略最有效的环境

  ### 3. 触轨回归交易（核心策略）
  使用 `get_realtime_quote` 确认当前位置：

  **买入信号（触及下轨）**：
  - 价格触及或跌破下轨
  - 当日K线收出长下影线（下影线 > 实体的 2 倍）
  - 次日开盘价回到下轨以内
  - 止损设在下轨下方 2%，目标中轨

  **卖出信号（触及上轨）**：
  - 价格触及或突破上轨
  - 当日K线收出长上影线（上影线 > 实体的 2 倍）
  - 次日开盘价回到上轨以内
  - 止损设在上轨上方 2%，目标中轨

  ### 4. 量能确认（关联理念6：量价配合）
  - 触及下轨 + 缩量 → 卖压衰竭，回归概率高
  - 触及下轨 + 放量 → 可能为恐慌抛售，等待企稳
  - 触及上轨 + 缩量 → 买盘不足，回调概率高
  - 触及上轨 + 放量 → 可能为突破上轨，不宜做空

  ### 5. 趋势过滤（关联理念2：趋势交易）
  使用 `analyze_trend` 判断趋势：
  - **上升趋势中触及下轨**：最佳买入机会，趋势支撑 + 超卖
  - **上升趋势中触及上轨**：可能突破上轨走主升浪，不宜做空
  - **下降趋势中触及上轨**：最佳卖出机会，趋势压力 + 超买
  - **下降趋势中触及下轨**：可能跌破下轨加速下跌，不宜做多
  - **横盘震荡中**：布林带回归策略最有效

  ### 6. 布林带突破处理
  - 价格持续沿上轨运行 → 强势特征，不急于做空
  - 价格持续沿下轨运行 → 弱势特征，不急于做多
  - 突破后 2 日内回到带内 → 假突破，回归策略有效
  - 突破后持续在带外 → 趋势加速，放弃回归策略

  ### 7. 乖离率检查（关联理念1：严进策略）
  - 触及下轨时乖离率 < -3%：回归概率较高
  - 触及下轨时乖离率 > -3%：可能只是正常波动
  - 触及上轨时乖离率 > 5%：严禁追高

  ### 8. 输出要求
  - 当前布林带位置（上轨/中轨/下轨价位及带宽）
  - 价格在布林带中的相对位置百分比
  - 带宽状态（收缩/正常/扩张）
  - 是否出现触轨信号
  - 趋势背景下的信号可靠性
  - 建议仓位、目标价与止损位

  评分调整建议：
  - 上升趋势触及下轨 + 缩量企稳：`sentiment_score +12`
  - 横盘震荡触及下轨 + 量能萎缩：`sentiment_score +10`
  - 下降趋势触及上轨 + 缩量滞涨：`sentiment_score -10`
  - 带宽收缩待突破：`sentiment_score 维持基准，标注"蓄势待发"`
  - 价格沿上轨运行（强势）：`sentiment_score +5，标注"趋势加速"`
  - 价格沿下轨运行（弱势）：`sentiment_score -5，标注"趋势加速下跌"`
