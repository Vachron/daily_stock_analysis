instructions: |
  **海龟交易法则（Turtle Trading Strategy）**

  核心哲学：趋势跟踪系统，不预测市场方向，只在趋势确认后入场，
  用 ATR 控制仓位和止损，"截断亏损，让利润奔跑"。

  ## 分析步骤

  ### 1. 突破信号识别
  使用 `get_daily_history` 获取近 60 日数据：

  **系统1（短期突破）**：
  - 买入信号：价格突破近 20 日最高价
  - 卖出信号：价格跌破近 10 日最低价
  - 灵敏度高，信号频繁，适合捕捉中期趋势

  **系统2（长期突破）****：
  - 买入信号：价格突破近 55 日最高价
  - 卖出信号：价格跌破近 20 日最低价
  - 灵敏度低，信号稀少，适合捕捉大级别趋势

  ### 2. ATR 仓位管理（核心风控）
  使用 `get_daily_history` 计算近 20 日 ATR（平均真实波幅）：

  - **单笔风险控制**：每笔交易最大亏损不超过总资金的 2%
  - **仓位计算**：仓位 = (总资金 × 2%) / (ATR × 合约乘数)
  - **ATR 含义**：近 20 日平均真实波幅，反映市场波动性
  - ATR > 股价的 5%：高波动，轻仓
  - ATR < 股价的 2%：低波动，可适当加仓

  ### 3. 金字塔加仓规则
  突破入场后，价格每向有利方向移动 0.5 倍 ATR，加仓一次：
  - 首次入场：计划仓位的 1/4
  - 第一次加仓：1/4（价格 +0.5ATR）
  - 第二次加仓：1/4（价格 +1.0ATR）
  - 第三次加仓：1/4（价格 +1.5ATR）
  - 最多加仓 3 次，总仓位不超过计划仓位

  ### 4. 止损规则（关联理念1：严进策略）
  - **系统1止损**：入场价 - 2 倍 ATR
  - **系统2止损**：入场价 - 2 倍 ATR
  - 加仓后止损调整：最新加仓价 - 2 倍 ATR
  - 绝不移动止损到亏损更大的位置
  - 单笔亏损超过 2% 总资金时强制止损

  ### 5. 离场规则
  **系统1离场**：价格跌破近 10 日最低价时全部离场
  **系统2离场**：价格跌破近 20 日最低价时全部离场
  - 不使用获利目标，让利润充分奔跑
  - 只有反向突破信号才离场

  ### 6. 趋势确认（关联理念2：趋势交易）
  使用 `analyze_trend` 确认：
  - 多头排列（MA5 > MA10 > MA20）+ 向上突破 → 高概率信号
  - 空头排列 + 向上突破 → 低概率信号，可能为假突破
  - 突破日成交量 > 5 日均量 → 突破有效性增强

  ### 7. 量能确认（关联理念3：效率优先）
  使用 `get_realtime_quote` 检查：
  - 突破日量比 > 1.5：有效突破
  - 突破日量比 < 0.8：可疑突破，可能失败
  - 突破后次日量能维持：趋势延续信号

  ### 8. 风险过滤（关联理念5：风险排查）
  - 通过 `search_stock_news` 检查是否有重大利空
  - 大盘处于系统性下跌时，暂停突破买入

  ### 9. 输出要求
  - 当前是否出现 20 日/55 日突破信号
  - 当前 ATR 值及建议仓位
  - 入场价、止损价、加仓价位
  - 趋势背景评估
  - 系统选择建议（系统1或系统2）

  评分调整建议：
  - 20 日向上突破确认 + 多头排列：`sentiment_score +12`
  - 55 日向上突破确认 + 多头排列：`sentiment_score +15`
  - 突破 + 放量确认：额外 `+5`
  - 突破但趋势不明：`sentiment_score +5`
  - 价格跌破 10 日/20 日最低价：`sentiment_score -12`
  - 无突破信号：不调整基础分
