# Bottom Volume Surge Strategy / 底部放量
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: 底部放量
description: 检测长期下跌后底部放量信号，潜在趋势反转信号。
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [地量见底, 底部放量]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **底部放量（Bottom Volume Surge Strategy）**

  反转判定标准：

  1. **持续下跌确认**：
     - 使用 `get_daily_history`（30日）。
     - 股价从 20 日高点到近期低点跌幅 > 15%。
     - `analyze_trend` → trend_status 应为 BEAR 或 STRONG_BEAR。

  2. **量能异动**：
     - 当日成交量 > 5 日均量的 3 倍。
     - 使用 `get_realtime_quote` → volume_ratio > 3.0。
     - 该异动应出现在前期极度缩量之后。

  3. **价格企稳**：
     - 当日K线收阳（收盘价 > 开盘价）。
     - 价格守住近期低点。
     - 最好出现长下影线，显示买方支撑。

  4. **确认因素**（关联理念5：风险排查）：
     - 通过 `search_stock_news` 确认是否有基本面催化。
     - 筹码分布：平均成本接近现价（成本收敛）。

  5. **风险提示**（关联理念2：趋势交易）：
     - 这是反转信号，风险高于趋势跟踪。
     - 仓位建议较小（最多 2-3 成）。
     - 止损必须严格（设在近期低点下方）。

  评分调整：
  - 底部放量确认：sentiment_score +8
  - 配合阳线 + 新闻催化：额外 +5
  - 在 `buy_reason` 和 `pattern_analysis` 中注明"底部放量"。
  - 止损设在近期低点。

# --- Alpha 因子参数化（Harness Engineering）---
factors:
  - id: decline_threshold
    display_name: 下跌幅度阈值
    type: float
    default: 0.15
    range: [0.05, 0.40]
    step: 0.01
  - id: volume_ratio_threshold
    display_name: 量比阈值
    type: float
    default: 3.0
    range: [1.5, 8.0]
    step: 0.5
  - id: score_base
    display_name: 基础得分
    type: float
    default: 8.0
    range: [1.0, 20.0]
    step: 1.0
  - id: score_catalyst_bonus
    display_name: 催化剂加分
    type: float
    default: 5.0
    range: [0.0, 15.0]
    step: 1.0
